<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 200px;
            height: 200px;
            border: 5px solid #333;
            margin: 25px auto;
            padding: 15px;
        }
        .rounded-box{
            width: 200px;
            height: 200px;
            border: 5px solid #333;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="box">Kenarlıklı</div>
    <div class="rounded-box">Yumuşak kenar</div>
</body>
</html>
